<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moda Fair Mint 控制台</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./app.js?v=20260621-form-autofill"></script>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Moda Fair Mint Token V1</p>
          <h1>部署与管理员控制台</h1>
        </div>
        <button id="connectWallet" class="primary">连接钱包</button>
        <div class="wallet-card">
          <span>当前钱包</span>
          <strong id="walletAddress">未连接</strong>
          <span>网络</span>
          <strong id="networkName">未知</strong>
        </div>
        <nav class="tabs" aria-label="功能切换">
          <button class="tab active" data-tab="deploy">部署</button>
          <button class="tab" data-tab="mint">用户 Mint</button>
          <button class="tab" data-tab="admin">管理员</button>
        </nav>
      </aside>

      <main>
        <section id="deploy" class="panel active">
          <div class="section-head">
            <div>
              <p class="eyebrow">Step 1</p>
              <h2>配置并部署合约</h2>
            </div>
            <button id="compileContract" class="secondary">编译合约</button>
          </div>

          <form id="deployForm" class="grid">
            <label>代币名称<input name="name" value="Moda Fair Mint Token" required /></label>
            <label>代币符号<input name="symbol" value="MODA" required /></label>
            <label>总供应量<input name="totalSupply" type="number" value="1000000000" min="1" required /></label>
            <label>Mint 模式<select name="mintMode"><option value="0">BNB</option><option value="1">USDT</option></select></label>
            <label>USDT 地址<input name="usdtAddress" placeholder="连接钱包后自动填写" /></label>
            <label>Router 地址<input name="router" placeholder="连接钱包后自动填写" required /></label>
            <label>单次 Mint 价格<input name="mintPrice" type="number" step="0.000000000000000001" value="0.01" required /></label>
            <label>单次 Mint 代币数<input name="tokenPerMint" type="number" value="1000000" min="1" required /></label>
            <label>最大 Mint 次数<input name="maxMintCount" type="number" value="1000" min="1" required /></label>
            <label>用户拿到代币比例 %<input name="userMintShare" type="number" value="70" min="0" max="100" step="0.01" required /></label>
            <label>进入流动性的募集资金 %<input name="lpFundShare" type="number" value="80" min="0" max="100" step="0.01" required /></label>
            <label>开盘模式<select name="launchMode"><option value="0">手动</option><option value="1">定时</option><option value="2">Mint 满自动</option></select></label>
            <label>开盘时间<input name="launchTime" type="datetime-local" /></label>
            <label>营销钱包<input name="marketingWallet" placeholder="默认使用部署钱包" /></label>
            <div id="deployHints" class="wide mini-stats"></div>
            <button class="primary wide" type="submit">部署合约</button>
          </form>
          <div id="verificationBox" class="downloads" hidden>
            <h3>验证开源材料</h3>
            <a id="downloadStandardJson" download="verify-standard-json-input.json">下载 Standard JSON</a>
            <a id="downloadConstructorArgs" download="constructor-args.txt">下载构造参数编码</a>
            <a id="downloadDeploymentInfo" download="deployment-info.json">下载部署记录</a>
          </div>
        </section>

        <section id="mint" class="panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Public</p>
              <h2>用户 Mint 页面</h2>
            </div>
          </div>
          <div class="grid compact">
            <label>合约地址<input id="mintContractAddress" placeholder="部署后会自动填入" /></label>
            <button id="loadMintInfo" class="secondary">读取 Mint 信息</button>
          </div>
          <div id="mintStats" class="stats"></div>
          <button id="mintNow" class="primary">立即 Mint</button>
          <button id="claimDividends" class="secondary">领取分红</button>
        </section>

        <section id="admin" class="panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Owner</p>
              <h2>管理员后续操作</h2>
            </div>
            <button id="refreshAdmin" class="secondary">刷新状态</button>
          </div>
          <div class="grid compact">
            <label>合约地址<input id="adminContractAddress" placeholder="部署后会自动填入" /></label>
            <button id="loadAdmin" class="secondary">加载合约</button>
          </div>
          <div id="adminStats" class="stats"></div>

          <div class="admin-groups">
            <article>
              <h3>Mint 与开盘</h3>
              <div class="row"><input id="newMintPrice" placeholder="新 Mint 价格" /><button data-action="setMintPrice">设置价格</button></div>
              <div class="row"><input id="newTokenPerMint" placeholder="新单次代币数" /><button data-action="setTokenPerMint">设置数量</button></div>
              <div class="row"><input id="newMaxMintCount" placeholder="新最大次数" /><button data-action="setMaxMintCount">设置上限</button></div>
              <div class="row"><input id="newLaunchTime" type="datetime-local" /><button data-action="setLaunchTime">设置时间</button></div>
              <button data-action="openTrading">开启交易</button>
              <button data-action="closeMint">关闭 Mint</button>
              <button data-action="pause">暂停</button>
              <button data-action="unpause">恢复</button>
            </article>

            <article>
              <h3>名单管理</h3>
              <div class="row"><select id="whitelistEnabled"><option value="true">开启白名单</option><option value="false">关闭白名单</option></select><button data-action="setWhitelistEnabled">保存</button></div>
              <div class="row"><input id="listAddress" placeholder="钱包地址" /><select id="listValue"><option value="true">加入</option><option value="false">移除</option></select></div>
              <button data-action="setWhitelist">白名单</button>
              <button data-action="setBlacklist">黑名单</button>
              <button data-action="setExcludedFromLimits">交易限制排除</button>
              <button data-action="setExcludedFromFee">手续费排除</button>
            </article>

            <article>
              <h3>税率与分配</h3>
              <div class="row"><input id="buyTax" placeholder="买税 BP" /><button data-action="setBuyTax">设置买税</button></div>
              <div class="row"><input id="sellTax" placeholder="卖税 BP" /><button data-action="setSellTax">设置卖税</button></div>
              <div class="row"><input id="transferTax" placeholder="转账税 BP" /><button data-action="setTransferTax">设置转账税</button></div>
              <div class="row three"><input id="marketingShare" placeholder="营销 BP" /><input id="burnShare" placeholder="销毁 BP" /><input id="lpShare" placeholder="LP BP" /></div>
              <button data-action="setTaxShares">设置分配比例</button>
              <div class="row"><input id="marketingWallet" placeholder="营销钱包" /><button data-action="setMarketingWallet">设置钱包</button></div>
              <div class="row"><input id="swapThreshold" placeholder="Swap 阈值" /><button data-action="setSwapThreshold">设置阈值</button></div>
              <button data-action="forceSwapBack">执行 SwapBack</button>
            </article>

            <article>
              <h3>分红、流动性与提现</h3>
              <div class="row"><input id="dividendAmount" placeholder="分红金额" /><button data-action="fundTokenDividend">代币持有人分红</button></div>
              <div class="row"><input id="lpDividendAmount" placeholder="LP 分红金额" /><button data-action="fundLPDividend">LP 分红</button></div>
              <div class="row"><input id="liqTokenAmount" placeholder="代币数量" /><input id="liqFundAmount" placeholder="资金数量" /><button data-action="forceAddLiquidity">加池</button></div>
              <div class="row"><input id="withdrawBNBAmount" placeholder="BNB 数量，空为全部" /><button data-action="withdrawBNB">提取 BNB</button></div>
              <div class="row"><input id="withdrawTokenAddress" placeholder="代币地址" /><input id="withdrawTokenAmount" placeholder="数量，空为全部" /><button data-action="withdrawToken">提取代币</button></div>
              <div class="row"><input id="withdrawLPAmount" placeholder="LP 数量，空为全部" /><button data-action="withdrawLP">提取 LP</button></div>
            </article>
          </div>
        </section>

        <pre id="log" aria-live="polite"></pre>
      </main>
    </div>
  </body>
</html>
